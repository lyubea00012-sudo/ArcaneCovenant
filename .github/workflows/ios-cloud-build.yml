name: iOS Cloud Build

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ios-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build and test on cloud Mac
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Show Apple toolchain
        run: |
          xcodebuild -version
          xcodebuild -showsdks

      - name: Select an available iPhone Simulator
        id: simulator
        shell: bash
        run: |
          SIMULATOR_ID=$(python3 - <<'PY'
          import json
          import re
          import subprocess

          payload = json.loads(
              subprocess.check_output(
                  ["xcrun", "simctl", "list", "devices", "available", "-j"],
                  text=True,
              )
          )

          candidates = []
          for runtime, devices in payload["devices"].items():
              if "iOS" not in runtime:
                  continue
              version = tuple(int(value) for value in re.findall(r"\d+", runtime))
              for device in devices:
                  if device.get("isAvailable") and device["name"].startswith("iPhone"):
                      candidates.append((version, device["name"], device["udid"]))

          if not candidates:
              raise SystemExit("No available iPhone Simulator was found")

          candidates.sort(reverse=True)
          print(candidates[0][2])
          PY
          )

          echo "id=$SIMULATOR_ID" >> "$GITHUB_OUTPUT"
          echo "Selected Simulator: $SIMULATOR_ID"

      - name: Build and run unit tests
        run: |
          set -o pipefail
          xcodebuild test \
            -project ArcaneCovenant.xcodeproj \
            -scheme ArcaneCovenant \
            -configuration Debug \
            -destination "platform=iOS Simulator,id=${{ steps.simulator.outputs.id }}" \
            -derivedDataPath build/DerivedData \
            -resultBundlePath build/TestResults.xcresult \
            CODE_SIGNING_ALLOWED=NO \
            | tee build.log

      - name: Package Simulator app
        if: success()
        shell: bash
        run: |
          APP_PATH=$(find build/DerivedData/Build/Products/Debug-iphonesimulator \
            -maxdepth 1 -name "ArcaneCovenant.app" -print -quit)

          if [[ -z "$APP_PATH" ]]; then
            echo "Built app was not found"
            exit 1
          fi

          ditto -c -k --sequesterRsrc --keepParent \
            "$APP_PATH" build/ArcaneCovenant-Simulator.zip

      - name: Upload Simulator build
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ArcaneCovenant-Simulator
          path: build/ArcaneCovenant-Simulator.zip
          if-no-files-found: error
          retention-days: 14

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ArcaneCovenant-Build-Diagnostics
          path: |
            build.log
            build/TestResults.xcresult
          if-no-files-found: warn
          retention-days: 7
